
{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Submit Report</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        {{ form.report_type.label_tag }}
        {{ form.report_type }}
    </div>

    <div class="mb-3">
        {{ form.description.label_tag }}
        {{ form.description }}
    </div>

    <div class="mb-3">
        {{ form.location.label_tag }}
        {{ form.location }}
    </div>

    <div class="mb-3">
        {{ form.image.label_tag }}
        {{ form.image }}
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
</form>

{% endblock %}
